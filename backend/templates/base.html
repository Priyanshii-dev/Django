{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}To Do List{% endblock %}</title>
    </head>
    <body>
        <header class="site-header">
            <nav class="nav">
                <a class="brand" href="{% url 'todolist' %}">TaskFlow</a>
                <div class="nav-links">
                    <a href="{% url 'todolist' %}">Tasks</a>
                    <a href="{% url 'about' %}">About</a>
                    <a href="{% url 'contact' %}">Contact</a>
                    {% if request.user.is_authenticated %}
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}">Login</a>
                        <a href="{% url 'register' %}">Register</a>
                    {% endif %}
                </div>
            </nav>
        </header>

        <main class="page">
            {% if messages %}
                <div class="alert-box">
                    {% for msg in messages %}
                        <p class="alert-text">{{ msg }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <!-- 2. BLANK PAGE SPACE -->
            {% block content %}
            <!-- Your main page content goes here later -->
            {% endblock %}

        </main>

    </body>
</html>
