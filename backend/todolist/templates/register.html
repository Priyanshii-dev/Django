{% extends "base.html" %}
{% block title %}Register{% endblock title %}

{% block content %}
<section class="todo-shell">
    <div class="todo-header">
        <div>
            <p class="eyebrow">Start fresh</p>
            <h1>Register</h1>
        </div>
    </div>

    <form class="task-form" method="post" action="{% url 'register' %}">
        {% csrf_token %}

        <label class="sr-only" for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="Username" autocomplete="username" required>

        <label class="sr-only" for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Password" autocomplete="new-password" required>

        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="{% url 'login' %}">Login</a>.</p>
</section>
{% endblock content %}
